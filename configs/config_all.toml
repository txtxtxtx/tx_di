# =============================================================================
#  tx_di 全量配置文件 (config_all.toml)
#  包含所有可用的配置模块，按初始化优先级排列。
#  所有字段均有默认值，可按需裁剪；未使用的 section 可直接删除。
# =============================================================================


# -----------------------------------------------------------------------------
#  日志配置 (LogConfig) — 初始化优先级: i32::MIN (最先初始化)
#  控制日志输出级别、文件轮转、控制台输出等行为。
# -----------------------------------------------------------------------------
[log_config]

# 全局日志级别，可选值: off / error / warn / info / debug / trace
level = "info"

# 按模块路径覆盖日志级别（key = 模块路径，value = 级别）
# 例如只对数据库模块开启 debug 日志，其余保持 info
[log_config.modules]
# "tx_di_toasty" = "debug"
# "tx_di_sip"    = "trace"

# 日志输出目录，程序会在该目录下按天生成日志文件
# 默认: <可执行文件所在目录>/logs
dir = "./logs"

# 日志文件名前缀，生成的文件形如: tx_di_2026-06-16.log
prefix = "tx_di"

# 日志文件保留天数，超过此天数的旧日志会被自动清理
retention_days = 90

# 是否同时输出到控制台（标准输出），开发调试时建议开启
console_output = true

# 时间格式: "local" 使用本地时间，"utc" 使用 UTC 时间
time_format = "local"

# 自定义时间格式字符串（tracing-subscriber 格式）
# 默认精确到毫秒，如 [14:30:05.123]
time_format_str = "[hour]:[minute]:[second].[subsecond digits:3]"

# 日志格式字符串（留空使用默认格式）
format = ""


# -----------------------------------------------------------------------------
#  Web 服务配置 (WebConfig) — 基于 Axum 的 HTTP 服务器
#  控制监听地址、端口、CORS、请求体大小、静态文件、SPA 路由、中间件等。
# -----------------------------------------------------------------------------
[web_config]

# 监听地址，支持 IPv4 和 IPv6
# IPv4: "0.0.0.0" 监听所有网卡，"127.0.0.1" 仅本机
# IPv6: "::" 监听所有网卡，"::1" 仅本机
host = "0.0.0.0"

# 监听端口
port = 8080

# 是否启用 CORS（跨域资源共享）
enable_cors = true

# 最大请求体大小（字节），默认 10MB
# 超过此大小的请求会被拒绝，返回 413
max_body_size = 10485760

# 静态文件目录，Web 服务器会自动提供该目录下的文件
static_dir = "./static"

# 请求超时时间（秒），超过此时间未完成的请求会被中断
timeout_secs = 30

# 是否启用 Swagger/OpenAPI 文档端点（需要编译时启用 api-doc feature）
enable_api_doc = true

# SPA 应用路由映射：将特定路径映射到前端构建产物目录
# 适合前后端分离项目，前端打包后的文件放在对应目录即可
# [web_config.spa_apps]
# "/admin"  = "ui/admin/dist"    # 管理后台前端
# "/portal" = "ui/portal/dist"   # 门户网站前端

# 中间件层配置：(优先级, 名称) 元组数组
# 优先级数值越小越靠近 handler（最后执行），越大越靠近外层（最先执行）
# 可用中间件名称: "auth" / "api_log" / "trace" / "timeout" / "compression" / "cors"
# layers = [
#     [100, "cors"],
#     [200, "compression"],
#     [300, "trace"],
#     [400, "api_log"],
#     [500, "timeout"],
#     [600, "auth"],
# ]


# -----------------------------------------------------------------------------
#  SIP 协议配置 (SipConfig) — 用于 GB28181 等 SIP 通信场景
# -----------------------------------------------------------------------------
[sip_config]

# SIP 监听地址
host = "0.0.0.0"

# SIP 监听端口（标准 SIP 端口为 5060）
port = 5060

# 传输协议: "udp" / "tcp" / "both"（同时监听 UDP 和 TCP）
transport = "udp"

# SIP User-Agent 头，标识本服务的名称和版本
user_agent = "tx-di-sip/1.0.0"

# 外网 IP（NAT 穿透用），设置后会在 Contact 和 Via 头中使用此地址
# 当服务部署在 NAT 后面时必须配置，否则对端无法回连
# external_ip = "203.0.113.100"

# 是否记录 SIP 消息日志（开启后会打印收发的每条 SIP 报文，调试用）
log_messages = false


# -----------------------------------------------------------------------------
#  数据库配置 (ToastyConfig) — 基于 Toasty ORM 的数据库访问层
#  初始化优先级: i32::MIN + 2（在日志和 SaToken 之后初始化）
# -----------------------------------------------------------------------------
[toasty_config]

# 数据库连接字符串，支持以下格式:
#   SQLite:     "sqlite://path/to/db.db" 或 "sqlite::memory:"（内存数据库）
#   PostgreSQL: "postgres://user:password@host:5432/dbname"
#   MySQL:      "mysql://user:password@host:3306/dbname"
database_url = "sqlite://data/app.db"

# 启动时是否自动创建/更新表结构（生产环境建议关闭，使用迁移工具管理）
auto_schema = false

# 连接池最大连接数，默认为 CPU 核心数 * 2
max_pool_size = 10

# 表名前缀，所有表名会自动添加此前缀（如 "tx_" -> "tx_users"）
# 留空则不添加前缀
# table_name_prefix = ""

# 连接池等待超时（秒），超过此时间无法获取空闲连接则报错
# pool_wait_timeout_secs = 30

# 连接创建超时（秒），建立新连接的最大等待时间
# pool_create_timeout_secs = 10

# 连接健康检查间隔（秒），后台定期检测连接是否有效
# pool_health_check_interval_secs = 60

# 连接最大生存时间（秒），超过后连接会被回收重建
# pool_max_connection_lifetime_secs = 1800

# 连接最大空闲时间（秒），空闲超过此时间的连接会被回收
# pool_max_connection_idle_time_secs = 600

# 取出连接前是否先 ping 一次（检测连接是否存活，会略微增加延迟）
pool_pre_ping = true

# 首次初始化（空数据库）时自动创建的管理员密码
# 仅在数据库为空时生效，不会覆盖已有数据
default_admin_password = "admin123"


# -----------------------------------------------------------------------------
#  文件存储配置 (FileConfig) — 支持本地存储和 S3 兼容存储
#  初始化优先级: i32::MIN + 3
# -----------------------------------------------------------------------------
[file_config]

# 存储后端: "local"（本地文件系统）或 "s3"（S3 兼容存储）
backend = "local"

# 本地存储根路径（backend = "local" 时生效）
base_path = "./uploads"

# 文件访问基础 URL，用于生成下载链接
# 例如设置为 "http://localhost:8080/files"，则文件可通过该 URL 前缀访问
base_url = ""

# 最大文件大小（字节），0 表示不限制
# max_file_size = 104857600  # 100MB

# 允许上传的文件扩展名列表（小写），空列表表示不限制
# allowed_extensions = ["jpg", "jpeg", "png", "gif", "pdf", "doc", "docx", "xls", "xlsx", "zip"]

# S3 兼容存储配置（backend = "s3" 时生效）
[file_config.s3]

# S3 存储桶名称
bucket = ""

# AWS 区域（使用 MinIO 等自建服务时可随意填写）
region = "ap-southeast-1"

# S3 兼容服务端点（MinIO、阿里云 OSS 等）
# 留空则使用 AWS 默认端点
endpoint = ""

# 访问密钥（留空则使用 AWS 默认凭证链，如环境变量或 IAM Role）
access_key = ""
secret_key = ""

# 是否使用路径风格（path-style），MinIO 等自建服务通常需要开启
# AWS S3 默认使用虚拟主机风格（virtual-hosted-style）
force_path_style = false


# -----------------------------------------------------------------------------
#  Sa-Token 认证配置 (SaTokenConf) — 轻量级权限认证框架
#  初始化优先级: i32::MIN + 1
# -----------------------------------------------------------------------------
[sa_token_config]

# Token 名称，同时也是 HTTP Header / Cookie / Query Param 的 key
token_name = "Authorization"

# Token 有效期（秒），默认 24 小时
# 设置为 -1 表示永不过期（不推荐用于生产环境）
timeout = 86400

# Token 最低活跃频率（秒），超过此时间无操作则 Token 失效
# 设置为 -1 表示不限制（Token 只要未过期就一直有效）
active_timeout = -1

# 是否启用 Token 自动续期（在 active_timeout 内有访问则自动延长有效期）
auto_renew = true

# 是否允许同一账号并发登录（true = 多端同时在线，false = 后登录踢掉先登录）
is_concurrent = true

# 多人登录同一账号时是否共用同一个 Token
# true = 共用（一个 Token 对应多次登录），false = 每次登录生成新 Token
is_share = true

# Token 生成风格:
#   "uuid"         — 标准 UUID（默认）
#   "simple-uuid"  — 简化 UUID（去除中划线）
#   "random-32"    — 32 位随机字符串
#   "random-64"    — 64 位随机字符串
#   "random-128"   — 128 位随机字符串
#   "jwt"          — JWT 格式（需配置 jwt_secret_key）
#   "hash"         — 哈希值
#   "tik"          — 唯一 tik 格式
#   "timestamp"    — 时间戳 + 随机数
token_style = "uuid"

# 是否从请求体（Body）中读取 Token
is_read_body = false

# 是否从请求头（Header）中读取 Token
is_read_header = true

# 是否从 Cookie 中读取 Token
is_read_cookie = true

# Token 前缀，用于从 Header 值中提取 Token
# 例如设置为 "Bearer "，则前端发送 "Authorization: Bearer xxx" 时自动提取 xxx
token_prefix = "Bearer "

# 是否输出 Sa-Token 操作日志（调试用）
is_log = false

# JWT 密钥（token_style = "jwt" 时必须配置）
# jwt_secret_key = "your-jwt-secret-key-here"

# JWT 算法，可选: HS256 / HS384 / HS512 / RS256 / RS384 / RS512
# jwt_algorithm = "HS256"

# 是否启用 nonce 防重放攻击
enable_nonce = false

# nonce 有效期（秒），-1 表示与 Token 有效期相同
nonce_timeout = -1

# 是否启用 Refresh Token（允许用 Refresh Token 换取新的 Access Token）
enable_refresh_token = false

# Refresh Token 有效期（秒），默认 7 天
refresh_token_timeout = 604800


# -----------------------------------------------------------------------------
#  GB28181 平台服务配置 (Gb28181ServerConfig) — 国标视频监控平台
#  初始化优先级: 10001
# -----------------------------------------------------------------------------
[gb28181_server_config]

# 平台 ID（20 位国标编码），符合 GB/T 28181 编码规范
# 编码规则: 省级(2) + 市级(2) + 区县(2) + 类型(3) + 序号(7) + 备用(4)
platform_id = "34020000002000000001"

# SIP 认证域（realm），通常为区域编码前 10 位
realm = "3402000000"

# SIP 服务 IP，用于构造 SIP URI 中的地址
# 需要设置为设备可访问的 IP（内网或公网）
sip_ip = "127.0.0.1"

# 设备心跳超时（秒），超过此时间未收到心跳则标记设备离线
heartbeat_timeout_secs = 120

# 设备注册有效期（秒），设备需要在此时间到期前重新注册
register_ttl = 3600

# 是否启用 SIP 摘要认证（设备注册时需要提供用户名密码）
enable_auth = true

# 全局认证密码（未单独配置的设备使用此密码）
auth_password = "12345678"

# 设备白名单（为空则允许所有设备注册）
# 只有列表中的设备 ID 才被允许注册
# allowed_device_ids = ["34020000001320000001", "34020000001320000002"]

# 设备黑名单（优先级高于白名单，黑名单中的设备一律拒绝）
blocked_device_ids = []

# 每台设备独立密码（优先级高于全局密码）
# key = 设备 ID，value = 密码
[gb28181_server_config.device_passwords]
# "34020000001320000001" = "password1"
# "34020000001320000002" = "password2"

# 媒体层配置（RTP 收流相关）
[gb28181_server_config.media]

# 媒体服务器 IP，用于 SDP 中的连接地址（c= 行）
# 设备会向此 IP 发送 RTP 流
local_ip = "0.0.0.0"

# RTP 端口范围（用于接收设备的音视频流）
# 范围越大可支持的并发流越多，每路流需要 1 个端口
rtp_port_start = 30000
rtp_port_end = 30500

# 级联配置（上下级平台互联）
[gb28181_server_config.cascade]

# 是否作为上级平台运行（接受下级设备/平台注册）
enable_upper = true

# 是否作为下级平台运行（向上级平台注册）
enable_lower = false

# 上级平台 SIP 地址（enable_lower = true 时生效）
# 格式: "sip:平台ID@IP:端口"
# upper_platform_sip = "sip:34020000002000000001@10.0.0.1:5060"

# 上级平台 ID
# upper_platform_id = "34020000002000000001"

# 向上级平台注册时使用的认证密码
# upper_auth_password = "12345678"

# 媒体后端配置（流媒体服务器对接）
[gb28181_server_config.media_backend]

# 后端类型: "zlm"（ZLMediaKit）/ "mediamtx"（MediaMTX）/ "null"（不对接流媒体）
backend_type = "zlm"

# ---- ZLMediaKit 配置 ----
[gb28181_server_config.media_backend.zlm]

# ZLM HTTP API 基础地址
base_url = "http://127.0.0.1:8080"

# ZLM API 认证密钥（在 ZLM 配置文件中设置的 secret）
secret = "035c73f7-bb6b-4889-a715-d9eb2d1925cc"

# API 请求超时（秒）
timeout_secs = 10

# RTSP 端口（用于生成播放地址）
rtsp_port = 554

# RTSP over TLS 端口（0 = 不启用）
rtsps_port = 0

# RTMP 端口（用于生成 RTMP 播放地址）
rtmp_port = 1935

# HTTP API 端口（0 = 从 base_url 自动推断）
http_port = 0

# HTTPS 端口（0 = 不启用）
https_port = 0

# ---- MediaMTX 配置 ----
# 当 backend_type = "mediamtx" 时使用以下配置
[gb28181_server_config.media_backend.mediamtx]

# MediaMTX HTTP API 地址
api_url = "http://127.0.0.1:9997"

# RTSP 播放地址前缀
rtsp_url = "rtsp://127.0.0.1:8554"

# RTSP over TLS 地址（留空 = 不启用）
rtsps_url = ""

# RTMP 播放地址前缀
rtmp_url = "rtmp://127.0.0.1:1935"

# HLS 播放地址前缀
hls_url = "http://127.0.0.1:8888"

# HLS over HTTPS 地址（留空 = 不启用）
hls_https_url = ""

# 本地 RTP 监听 IP
rtp_ip = "0.0.0.0"

# RTP 端口范围
rtp_port_start = 30000
rtp_port_end = 31000

# API 请求超时（秒）
timeout_secs = 10


# -----------------------------------------------------------------------------
#  CAN 总线配置 (CanConfig) — 车载 CAN/CAN FD 通信
#  注意: 此配置不由 DI 框架自动加载，需手动调用 CanConfig::load_from_toml()
# -----------------------------------------------------------------------------
[can_config]

# 总线适配器类型:
#   "socketcan" — Linux SocketCAN（需内核支持）
#   "pcan"      — PEAK PCAN 适配器
#   "kvaser"    — Kvaser 适配器
#   "simbus"    — 模拟总线（开发调试用）
adapter = "simbus"

# CAN 接口名称
# Linux: "can0", "vcan0" 等
# Windows: "PCAN_USBBUS1" 等
interface = "vcan0"

# 仲裁段比特率（bps），标准 CAN 通常为 500000
bitrate = 500000

# CAN FD 数据段比特率（bps），仅 enable_fd = true 时生效
fd_bitrate = 2000000

# 是否启用 CAN FD（灵活数据速率，支持最大 64 字节帧）
enable_fd = false

# 接收队列大小（帧数），队列满时新帧会被丢弃
rx_queue_size = 512

# 发送超时（毫秒）
tx_timeout_ms = 100

# ISO-TP 传输层配置（用于 UDS 诊断通信）
# ISO-TP 发送 CAN ID（通常是诊断仪 -> ECU）
isotp_tx_id = 0x7E0

# ISO-TP 接收 CAN ID（通常是 ECU -> 诊断仪）
isotp_rx_id = 0x7E8

# ISO-TP 块大小（连续帧数量），0 = 由 ECU 决定
isotp_block_size = 0

# ISO-TP STmin（连续帧最小间隔，毫秒），0 = 尽快发送
isotp_st_min_ms = 0

# UDS 诊断超时配置
# P2 超时（毫秒）— ECU 处理请求的最大等待时间
uds_p2_timeout_ms = 150

# P2* 超时（毫秒）— ECU 请求扩展响应的最大等待时间
uds_p2_star_timeout_ms = 5000


# -----------------------------------------------------------------------------
#  应用自定义配置示例 (AppConfig)
#  以下是自定义应用配置的示例，可根据项目需要自由扩展。
#  只要 struct 实现了 #[tx_comp(conf)] 并 derive Deserialize，即可自动加载。
# -----------------------------------------------------------------------------
[app_config]

# 应用名称
app_name = "tx-di-app"

# 应用端口（用于自定义服务，与 web_config.port 独立）
port = 9000
