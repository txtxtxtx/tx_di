# tx_di 配置文件示例
# 此文件用于演示从配置文件加载组件配置

[log_config]
level = "debug"             # 日志级别
prefix = "di-axum"          # 日志前缀
dir = "./logs"              # 日志目录
console_output = true       # 控制台输出日志
time_format = "local"       # local / utc
[web_config]
# IPv4 配置
host = "127.0.0.1"
# IPv6 配置（取消注释使用）
# host = "::1"              # IPv6 localhost
# host = "::"               # 监听所有 IPv6 接口
port = 8888
enable_cors = true          # 允许跨域
max_body_size = 10485760    # 10M
timeout_secs = 6            # 请求超时时间
layers = [
#    [1,"auth"],           # 最内层，最靠近 Handler 请在业务模块实现并注册
    [10,"api_log"],        # 请求日志，包含请求和返回信息的日志
#    [3,"trace"],          # 链路追踪，包含链路追踪信息的日志
    [100,"compression"],    # 压缩
    [10000,"cors"]   # 允许跨域,最外层,最先接收请求
]
[web_config.spa_apps]
"/mood" = "./static/mood/dist"

# ── SIP 服务配置 ────────────────────────────────────────────────
[sip_config]
# 监听地址（IPv4 / IPv6 双栈）
# "0.0.0.0"  → 仅 IPv4
# "::"        → 所有 IPv6 接口（大多数系统同时支持 IPv4，即双栈）
# "127.0.0.1" → 仅本地回环（测试用）
host     = "0.0.0.0"
port     = 5060
# 传输协议: "udp"(默认) | "tcp" | "both"
transport = "udp"
user_agent = "tx-di-sip/0.1.0"
# 对外可见 IP（NAT 穿透时使用，不填则自动使用 host）
# external_ip = ""
# 开启 SIP 消息日志（调试用）
log_messages = false