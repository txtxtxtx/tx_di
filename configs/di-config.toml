# tx_di 配置文件示例
# 此文件用于演示从配置文件加载组件配置

[log_config]
level = "debug"
prefix = "di-axum"
dir = "./logs"
console_output = true

[web_config]
# IPv4 配置
host = "127.0.0.1"
# IPv6 配置（取消注释使用）
# host = "::1"          # IPv6 localhost
# host = "::"           # 监听所有 IPv6 接口
port = 8888
enable_cors = true
max_body_size = 10485760
