syntax = "proto3";

package admin.monitor;

import "google/protobuf/empty.proto";

message DiskInfo {
  string name = 1;            // 磁盘名称
  uint64 total_space = 2;     // 字节
  uint64 available_space = 3; // 字节
  double usage = 4;           // 百分比
}

message NetworkInfo {
  string name = 1;                     // 接口名称
  string mac_address = 2;              // MAC 地址
  repeated string ip_addresses = 3;    // IP 地址列表
  uint64 received_bytes = 4;           // 收到字节总数
  uint64 transmitted_bytes = 5;        // 发送字节总数
  uint64 received_packets = 6;         // 收到包数
  uint64 transmitted_packets = 7;      // 发送包数
}

message ServerInfo {
  string os_name = 1;
  string os_version = 2;
  string hostname = 3;
  uint32 cpu_cores = 4;
  double cpu_usage = 5;       // 百分比
  uint64 total_memory = 6;    // 字节
  uint64 used_memory = 7;     // 字节
  double memory_usage = 8;    // 百分比
  uint64 total_disk = 9;      // 字节
  uint64 used_disk = 10;      // 字节
  double disk_usage = 11;     // 百分比
  repeated DiskInfo disks = 12;
  repeated NetworkInfo networks = 13;
}

message OnlineUser {
  uint64 user_id = 1;
  string username = 2;
  string login_ip = 3;
  string login_time = 4;
}

message OnlineUserListResponse {
  repeated OnlineUser users = 1;
  uint64 total = 2;
}

service MonitorService {
  rpc GetServerInfo(google.protobuf.Empty) returns (ServerInfo);
  rpc GetOnlineUsers(google.protobuf.Empty) returns (OnlineUserListResponse);
}
