syntax = "proto3";

package admin.permission;

import "common.proto";

// ============================================================
// 权限服务
// ============================================================

service PermissionService {
  // 原有查询接口
  rpc CheckPermission(PermissionCheckRequest) returns (PermissionCheckResponse);
  rpc GetUserPermissions(GetUserPermissionsRequest) returns (UserPermissionsResponse);
  // 新增 CRUD 接口
  rpc CreatePermission(CreatePermissionRequest) returns (PermissionDetail);
  rpc UpdatePermission(UpdatePermissionRequest) returns (PermissionDetail);
  rpc DeletePermission(DeletePermissionRequest) returns (admin.common.Empty);
  rpc GetPermission(GetPermissionRequest) returns (PermissionDetail);
  rpc ListPermissions(ListPermissionsRequest) returns (ListPermissionsResponse);
}

// ============================================================
// 原有消息（保持不变）
// ============================================================

message PermissionCheckRequest {
  uint64 user_id = 1;
  string permission = 2;
}

message PermissionCheckResponse {
  bool has_permission = 1;
}

message GetUserPermissionsRequest {
  uint64 user_id = 1;
}

message UserPermissionsResponse {
  uint64 user_id = 1;
  repeated string permissions = 2;
  repeated UserPermissionItem items = 3;
}

// 用于用户权限展示的轻量项（原 PermissionItem 重命名）
message UserPermissionItem {
  string code = 1;
  string name = 2;
  string permission_type = 3;
}

// ============================================================
// 新增 CRUD 消息
// ============================================================

// 权限详情（完整实体）
message PermissionDetail {
  uint64 id = 1;
  string name = 2;
  string permission_code = 3;   // 如 "user:create"
  int32 type = 4;               // 0-菜单 1-按钮 2-接口
  uint64 parent_id = 5;
  int32 sort = 6;
  string description = 7;
  int32 status = 8;
}

message CreatePermissionRequest {
  string name = 1;
  string permission_code = 2;
  int32 type = 3;
  uint64 parent_id = 4;
  int32 sort = 5;
  string description = 6;
}

message UpdatePermissionRequest {
  uint64 id = 1;
  string name = 2;
  string permission_code = 3;
  int32 type = 4;
  uint64 parent_id = 5;
  int32 sort = 6;
  string description = 7;
}

message DeletePermissionRequest {
  uint64 id = 1;
}

message GetPermissionRequest {
  uint64 id = 1;
}

message ListPermissionsRequest {
  // 空 = 返回全部
}

message ListPermissionsResponse {
  repeated PermissionDetail permissions = 1;
}
