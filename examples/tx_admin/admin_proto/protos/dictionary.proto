syntax = "proto3";

package admin.dict;

import "common.proto";

// ============================================================
// 字典服务
// ============================================================

service DictService {
  // 字典类型 CRUD
  rpc CreateDictType(CreateDictTypeRequest) returns (DictTypeResponse);
  rpc UpdateDictType(UpdateDictTypeRequest) returns (DictTypeResponse);
  rpc DeleteDictType(DeleteDictTypeRequest) returns (admin.common.Empty);
  rpc GetDictType(GetDictTypeRequest) returns (DictTypeResponse);
  rpc ListDictTypes(ListDictTypesRequest) returns (ListDictTypesResponse);

  // 字典数据 CRUD
  rpc CreateDictData(CreateDictDataRequest) returns (DictDataResponse);
  rpc UpdateDictData(UpdateDictDataRequest) returns (DictDataResponse);
  rpc DeleteDictData(DeleteDictDataRequest) returns (admin.common.Empty);
  rpc GetDictData(GetDictDataRequest) returns (DictDataResponse);
  rpc ListDictData(ListDictDataRequest) returns (ListDictDataResponse);
}

// ---- 字典类型 ----

message CreateDictTypeRequest {
  string name = 1;
  string dict_type = 2;
  optional string remark = 3;
}

message UpdateDictTypeRequest {
  uint64 id = 1;
  string name = 2;
  string dict_type = 3;
  optional string remark = 4;
}

message DeleteDictTypeRequest {
  uint64 id = 1;
}

message GetDictTypeRequest {
  uint64 id = 1;
}

message ListDictTypesRequest {
  optional string name = 1;
  optional string dict_type = 2;
  optional int32 status = 3;
  int64 page = 4;
  int64 page_size = 5;
}

message DictTypeResponse {
  uint64 id = 1;
  string name = 2;
  string dict_type = 3;
  int32 status = 4;
  optional string remark = 5;
}

message ListDictTypesResponse {
  repeated DictTypeResponse items = 1;
  admin.common.PageInfo page_info = 2;
}

// ---- 字典数据 ----

message CreateDictDataRequest {
  int32 sort = 1;
  string label = 2;
  string value = 3;
  string dict_type = 4;
  optional string color_type = 5;
  optional string css_class = 6;
  optional string remark = 7;
}

message UpdateDictDataRequest {
  uint64 id = 1;
  int32 sort = 2;
  string label = 3;
  string value = 4;
  string dict_type = 5;
  optional string color_type = 6;
  optional string css_class = 7;
  optional string remark = 8;
}

message DeleteDictDataRequest {
  uint64 id = 1;
}

message GetDictDataRequest {
  uint64 id = 1;
}

message ListDictDataRequest {
  optional string dict_type = 1;
  optional string label = 2;
  optional int32 status = 3;
  int64 page = 4;
  int64 page_size = 5;
}

message DictDataResponse {
  uint64 id = 1;
  int32 sort = 2;
  string label = 3;
  string value = 4;
  string dict_type = 5;
  int32 status = 6;
  optional string color_type = 7;
  optional string css_class = 8;
  optional string remark = 9;
}

message ListDictDataResponse {
  repeated DictDataResponse items = 1;
  admin.common.PageInfo page_info = 2;
}
