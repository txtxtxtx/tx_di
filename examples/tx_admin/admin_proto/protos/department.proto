syntax = "proto3";

package admin.dept;

import "common.proto";

// ============================================================
// 部门服务
// ============================================================

service DepartmentService {
  rpc CreateDept(CreateDeptRequest) returns (DeptResponse);
  rpc UpdateDept(UpdateDeptRequest) returns (DeptResponse);
  rpc DeleteDept(DeleteDeptRequest) returns (admin.common.Empty);
  rpc GetDept(GetDeptRequest) returns (DeptResponse);
  rpc ListDepts(ListDeptsRequest) returns (ListDeptsResponse);
}

message CreateDeptRequest {
  string name = 1;
  uint64 parent_id = 2;
  int32 sort = 3;
  optional uint64 leader_user_id = 4;
  optional string phone = 5;
  optional string email = 6;
}

message UpdateDeptRequest {
  uint64 dept_id = 1;
  string name = 2;
  uint64 parent_id = 3;
  int32 sort = 4;
  optional uint64 leader_user_id = 5;
  optional string phone = 6;
  optional string email = 7;
}

message DeleteDeptRequest {
  uint64 dept_id = 1;
}

message GetDeptRequest {
  uint64 dept_id = 1;
}

message ListDeptsRequest {
  optional string name = 1;
  optional int32 status = 2;
}

message DeptResponse {
  uint64 id = 1;
  string name = 2;
  uint64 parent_id = 3;
  int32 sort = 4;
  optional uint64 leader_user_id = 5;
  optional string phone = 6;
  optional string email = 7;
  int32 status = 8;
}

message ListDeptsResponse {
  repeated DeptResponse items = 1;
}
