syntax = "proto3";

package admin.file;

import "common.proto";

// ============================================================
// 文件服务
// ============================================================

service FileService {
  rpc UploadFile(UploadFileRequest) returns (FileResponse);
  rpc DeleteFile(DeleteFileRequest) returns (admin.common.Empty);
  rpc GetFile(GetFileRequest) returns (FileResponse);
  rpc ListFiles(ListFilesRequest) returns (ListFilesResponse);
  rpc DownloadFile(DownloadFileRequest) returns (DownloadFileResponse);
}

message UploadFileRequest {
  string name = 1;
  string path = 2;
  string url = 3;
  optional string file_type = 4;
  int32 size = 5;
  optional uint64 config_id = 6;
}

message DeleteFileRequest {
  uint64 file_id = 1;
}

message GetFileRequest {
  uint64 file_id = 1;
}

message ListFilesRequest {
  optional string name = 1;
  optional string file_type = 2;
  optional uint64 config_id = 3;
  int64 page = 4;
  int64 page_size = 5;
}

message FileResponse {
  uint64 id = 1;
  optional uint64 config_id = 2;
  string name = 3;
  string path = 4;
  string url = 5;
  optional string file_type = 6;
  int32 size = 7;
}

message ListFilesResponse {
  repeated FileResponse items = 1;
  admin.common.PageResponse page_info = 2;
}

message DownloadFileRequest {
  uint64 file_id = 1;
}

message DownloadFileResponse {
  string url = 1;          // 下载链接
  string filename = 2;     // 文件名
  uint64 size = 3;         // 文件大小
  string content_type = 4; // MIME 类型
}

// ============================================================
// 文件配置服务
// ============================================================

service FileConfigService {
  rpc ListFileConfigs(admin.common.Empty) returns (ListFileConfigsResponse);
  rpc GetFileConfig(GetFileConfigRequest) returns (FileConfigResponse);
  rpc CreateFileConfig(CreateFileConfigRequest) returns (FileConfigResponse);
  rpc UpdateFileConfig(UpdateFileConfigRequest) returns (FileConfigResponse);
  rpc DeleteFileConfig(DeleteFileConfigRequest) returns (admin.common.Empty);
  rpc SetMasterFileConfig(SetMasterFileConfigRequest) returns (FileConfigResponse);
}

message FileConfigResponse {
  uint64 id = 1;
  string name = 2;
  int32 storage = 3;         // 0=本地, 1=S3, 2=数据库
  optional string remark = 4;
  int32 master = 5;          // 0=普通, 1=主配置
  string config = 6;         // JSON 配置
}

message ListFileConfigsResponse {
  repeated FileConfigResponse items = 1;
}

message GetFileConfigRequest {
  uint64 id = 1;
}

message CreateFileConfigRequest {
  string name = 1;
  int32 storage = 2;
  optional string remark = 3;
  string config = 4;
}

message UpdateFileConfigRequest {
  uint64 id = 1;
  string name = 2;
  int32 storage = 3;
  optional string remark = 4;
  string config = 5;
}

message DeleteFileConfigRequest {
  uint64 id = 1;
}

message SetMasterFileConfigRequest {
  uint64 id = 1;
}
