syntax = "proto3";

package admin.auth;

import "common.proto";

// ============================================================
// 认证服务
// ============================================================

service AuthService {
  /// 用户登录
  rpc Login(LoginRequest) returns (LoginResponse);
  /// 获取当前用户信息
  rpc GetUserInfo(GetUserInfoRequest) returns (UserInfoResponse);
  /// 用户登出
  rpc Logout(LogoutRequest) returns (admin.common.Empty);
}

message LoginRequest {
  string username = 1;
  string password = 2;
  string login_ip = 3;
}

message LoginResponse {
  uint64 user_id = 1;
  string username = 2;
  string nickname = 3;
  uint64 tenant_id = 4;
  repeated uint64 role_ids = 5;
  repeated string permissions = 6;
  repeated uint64 dept_ids = 7;
  string token = 8;
  repeated string role_codes = 9;
}

message GetUserInfoRequest {
  uint64 user_id = 1;
}

message UserInfoResponse {
  uint64 user_id = 1;
  string username = 2;
  string nickname = 3;
  optional string email = 4;
  optional string mobile = 5;
  optional string avatar = 6;
  repeated string roles = 7;
  repeated string permissions = 8;
  uint64 tenant_id = 9;
}

message LogoutRequest {
  uint64 user_id = 1;
}
