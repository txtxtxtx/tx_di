# admin_server DDD 后台管理系统配置

[log_config]
level = "debug"
prefix = "tx_admin"
dir = "./logs"
console_output = true
time_format = "local"
retention_days = 7

[web_config]
host = "::" #"127.0.0.1"
port = 8888
enable_cors = true
max_body_size = 10485760    # 10MB
timeout_secs = 30
layers = [
    [10, "api_log"],
    [100, "compression"],
    [10000, "cors"],
]

# 文件存储配置
[file_config]
backend = "local"
base_path = "./uploads"
base_url = "http://localhost:8080/files"
max_file_size = 10485760
allowed_extensions = ["jpg", "jpeg", "png", "gif", "pdf", "doc", "docx", "xls", "xlsx", "txt", "zip"]

# S3 存储配置（可选，启用需设置 backend = "s3"）
[file_config.s3]
bucket = ""
region = "ap-southeast-1"
endpoint = ""
access_key = ""
secret_key = ""
force_path_style = false
