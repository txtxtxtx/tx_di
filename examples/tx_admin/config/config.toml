[file_config]
allowed_extensions = ["jpg", "jpeg", "png", "gif", "pdf", "doc", "docx", "xls", "xlsx", "txt", "zip"]
backend = "local"
base_path = "./uploads"
base_url = "http://localhost:8080/files"
max_file_size = 10485760

[file_config.s3]
access_key = ""
bucket = ""
endpoint = ""
force_path_style = false
region = "ap-southeast-1"
secret_key = ""

[log_config]
console_output = true
dir = "./logs"
level = "debug"
prefix = "tx_admin"
retention_days = 7
time_format = "local"

[toasty_config]
auto_schema = false
database_url = "sqlite:examples/tx_admin/data/tx_admin.db"
max_pool_size = 10

[web_config]
enable_cors = true
host = "::"
layers = [[5, "timeout"], [10, "api_log"], [100, "compression"], [10000, "cors"]]
max_body_size = 10485760
port = 8888
timeout_secs = 30
