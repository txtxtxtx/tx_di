[file_config]
backend = "local"
base_path = "./uploads"
base_url = "http://localhost:8080/files"
max_file_size = 10485760

[file_config.s3]
access_key = ""
bucket = ""
endpoint = ""
force_path_style = false
region = "ap-southeast-1"
secret_key = ""

[log_config]
console_output = true
dir = "./logs"
level = "debug"
prefix = "tx_admin"
retention_days = 7
time_format = "local"

[sa_token_config]
active_timeout = 1800
auto_renew = true
enable_refresh_token = true
is_concurrent = true
is_read_cookie = false
is_read_header = true
is_share = true
refresh_token_timeout = 604800
timeout = 86400
token_name = "Authorization"
token_style = "simple-uuid"

[toasty_config]
auto_schema = false
database_url = "sqlite:examples/tx_admin/data/tx_admin.db"
max_pool_size = 10

[job_config]
enabled = true
poll_interval_secs = 1
shell_timeout_secs = 300
python_timeout_secs = 300
python_path = "/usr/bin/python3"
thread_pool_size = 4

[web_config]
enable_api_doc = true
enable_cors = true
host = "::"
layers = [[5, "timeout"], [10, "api_log"], [100, "compression"], [10000, "cors"]]
max_body_size = 104857600
port = 8888
timeout_secs = 30

[web_config.spa_apps]
"/web" = "examples/tx_admin/web/dist"